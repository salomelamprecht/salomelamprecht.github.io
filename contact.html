<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Salome Lamprecht — Care Sector Data, Reporting & Compliance Consultant.">
    <title>Contact | Salome Lamprecht | Care Sector Consultant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="container-fluid p-0">
        <div class="row g-0 d-flex align-items-stretch">
            <a href="index.html" class="col-lg-4 logo"></a>
            
            <div class="col-lg-8 d-flex flex-column">
                <div class="bg-color-name-title heading flex-grow-1">
                    <h1 class="name uppercase">Salome Lamprecht</h1>
                    <h2 class="title">Care Sector Data, Reporting & Compliance Consultant</h2>
                </div>

                <nav>
                    <ul id="nav">
                        <li class="menuitem ui-menu-color-home"><a href="index.html"><i class="fa fa-home"></i><span>Home</span></a></li>
                        <li class="menuitem ui-menu-color-resume"><a href="resume.html"><i class="fa fa-graduation-cap"></i><span>Experience</span></a></li>
                        <li class="menuitem ui-menu-color-contact"><a href="contact.html"><i class="fa fa-address-book"></i><span>Contact</span></a></li>
                        <li class="menuitem ui-menu-color-reviews"><a href="reviews.html"><i class="fa fa-comment"></i><span>Testimonials</span></a></li>
                        <li class="menuitem ui-menu-color-resume"><a href="blog.html"><i class="fa fa-pen"></i><span>Blog</span></a></li>
                        <li class="menuitem ui-menu-color-interests"><a href="interests.html"><i class="fa fa-users"></i><span>Interests</span></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container-fluid bg-color-contact py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="section-column shadow-sm p-5 bg-white rounded">
                        <h3 class="contact-heading uppercase text-center mb-2">Get in touch</h3>
                        <p class="text-center text-muted uppercase mb-5 small">Care Sector Consultancy Enquiry</p>

                        <form id="contact_form" action="https://formsubmit.co/salomelamprecht@outlook.com" method="POST">
                            
                            <input type="text" name="_honey" style="display:none">
                            <input type="hidden" name="_captcha" value="false">
                            <input type="hidden" name="_next" value="https://salomelamprecht.github.io/thankyou.html">
                            <input type="hidden" name="_subject" value="New Website Enquiry: Care Sector Consultancy">

                            <div class="mb-3">
                                <label for="name" class="form-label small uppercase fw-bold">Name</label>
                                <input class="form-control" type="text" name="name" id="name" placeholder="Your Name" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label small uppercase fw-bold">Email Address</label>
                                <input class="form-control" type="email" name="email" id="email" placeholder="name@company.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="message" class="form-label small uppercase fw-bold">How Can I Help?</label>
                                <textarea rows="5" name="message" id="message" class="form-control" placeholder="Tell me about your reporting, compliance or systems challenges..." required></textarea>
                            </div>
                            
                            <div class="text-center">
                                <button id="button" type="submit" class="px-5 uppercase">Send Enquiry</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container-fluid py-4">
        <div class="container text-center">
            <p class="mb-0 uppercase small">© 2026 Salome Lamprecht | Care Sector Data & Compliance Consultant</p>
            <div class="social-links mt-2">
                <a href="https://linkedin.com/in/salomelamprecht/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
